name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create index.html with Pyxel Launcher Link
        run: |
          # Create index.html that redirects to Pyxel Web Launcher
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ConcLand - Minimal City Simulation</title>
            <style>
              body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 20px;
              }
              .container {
                text-align: center;
                padding: 3rem;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 20px;
                backdrop-filter: blur(10px);
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
                max-width: 600px;
              }
              h1 {
                font-size: 3.5rem;
                margin-bottom: 0.5rem;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
              }
              .subtitle {
                font-size: 1.3rem;
                margin-bottom: 2rem;
                opacity: 0.9;
              }
              .play-btn {
                display: inline-block;
                padding: 1.2rem 3rem;
                background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
                color: white;
                text-decoration: none;
                border-radius: 50px;
                font-weight: bold;
                font-size: 1.3rem;
                transition: all 0.3s;
                margin: 1rem;
                box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
              }
              .play-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
              }
              .github-btn {
                display: inline-block;
                padding: 1rem 2rem;
                background: rgba(255, 255, 255, 0.2);
                color: white;
                text-decoration: none;
                border-radius: 50px;
                font-weight: bold;
                transition: all 0.3s;
                margin: 1rem;
                border: 2px solid rgba(255, 255, 255, 0.3);
              }
              .github-btn:hover {
                background: rgba(255, 255, 255, 0.3);
                transform: translateY(-2px);
              }
              .info {
                margin-top: 2.5rem;
                padding: 1.5rem;
                background: rgba(0,0,0,0.2);
                border-radius: 15px;
                font-size: 0.95rem;
                line-height: 1.6;
              }
              .info h3 {
                margin-top: 0;
                margin-bottom: 1rem;
              }
              .info ul {
                text-align: left;
                padding-left: 20px;
              }
              .info li {
                margin: 0.5rem 0;
              }
              .features {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
                margin-top: 1.5rem;
              }
              .feature {
                background: rgba(255, 255, 255, 0.1);
                padding: 0.8rem 1.5rem;
                border-radius: 20px;
                font-size: 0.9rem;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>ConcLand</h1>
              <p class="subtitle">Minimal City Simulation Game</p>

              <a href="https://kitao.github.io/pyxel/wasm/launcher/?run=kurogedelic.ConcLand.concland_mini" class="play-btn" target="_blank">
                Play Now
              </a>

              <div class="features">
                <span class="feature">RCI Zoning</span>
                <span class="feature">Traffic Simulation</span>
                <span class="feature">Economy</span>
                <span class="feature">Disasters</span>
              </div>

              <div class="info">
                <h3>About ConcLand</h3>
                <p>
                  A minimal city simulation game inspired by classic city builders.
                  Build and manage your own city with residential, commercial, and industrial zones.
                </p>
                <p>
                  <strong>Controls:</strong> Arrow keys to move, Space to build, H for help
                </p>
              </div>

              <a href="https://github.com/kurogedelic/ConcLand" class="github-btn" target="_blank">
                View on GitHub
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Create Pyxel App Package
        run: |
          # Create .pyxapp file from prepared directory
          cd web_package
          pyxel package . ConcLand

          # Move the .pyxapp file back to root
          mv ConcLand.pyxapp ../

      - name: Convert to HTML
        run: |
          # Convert .pyxapp to HTML
          pyxel app2html ConcLand.pyxapp || echo "HTML conversion failed, will use launcher fallback"

      - name: Create Fallback Index
        if: always()
        run: |
          # Create index.html with Pyxel Web Launcher link
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ConcLand - City Simulation Game</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                margin: 0;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
              }
              .container {
                text-align: center;
                padding: 2rem;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 10px;
                backdrop-filter: blur(10px);
              }
              h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
              }
              .btn {
                display: inline-block;
                padding: 1rem 2rem;
                background: #4CAF50;
                color: white;
                text-decoration: none;
                border-radius: 5px;
                font-weight: bold;
                transition: all 0.3s;
                margin: 0.5rem;
              }
              .btn:hover {
                background: #45a049;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
              }
              .btn-secondary {
                background: #2196F3;
              }
              .btn-secondary:hover {
                background: #0b7dda;
              }
              .info {
                margin-top: 2rem;
                padding: 1rem;
                background: rgba(0,0,0,0.2);
                border-radius: 5px;
                font-size: 0.9rem;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>ConcLand</h1>
              <p>Minimal City Simulation Game</p>

              <a href="ConcLand.html" class="btn">Play Web Version</a>
              <a href="https://kitao.github.io/pyxel/wasm/launcher/?run=kurogedelic.ConcLand.concland_mini" class="btn btn-secondary" target="_blank">
                Play via Pyxel Launcher
              </a>

              <div class="info">
                <p><strong>Instructions:</strong></p>
                <ul style="list-style: none; padding: 0;">
                  <li>Click "Play Web Version" to play the optimized HTML version</li>
                  <li>Or click "Play via Pyxel Launcher" for the full experience</li>
                </ul>
                <p style="margin-top: 1rem;">
                  <a href="https://github.com/kurogedelic/ConcLand" style="color: #4CAF50;">View on GitHub</a>
                </p>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
          # Upload both HTML files

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
