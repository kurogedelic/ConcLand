name: Build and Deploy Pyxel Web

on:
  push:
    branches: [ main ]
    paths:
      - 'concland_mini.py'
      - 'assets/**'
      - '.github/workflows/build-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pyxel
        run: |
          pip install pyxel

      - name: Create Pyxel App Package
        run: |
          # Create .pyxapp file
          pyxel package concland_mini.py ConcLand

      - name: Convert to HTML
        run: |
          # Convert .pyxapp to HTML
          pyxel app2html ConcLand.pyxapp

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ConcLand.html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
